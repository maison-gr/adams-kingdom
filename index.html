<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Adam's Kingdom</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; height: -webkit-fill-available; }
    body {
      width: 100%; height: 100%; min-height: 100vh; min-height: -webkit-fill-available;
      background: #0a0a1a; overflow: hidden;
      position: fixed; top: 0; left: 0;
      touch-action: none;
    }
    #game {
      width: 100%; height: 100%;
      position: fixed; top: 0; left: 0;
    }
    canvas { display: block; touch-action: none; }
    /* Landscape orientation warning for phones */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      #rotate-msg {
        display: flex !important;
      }
    }
    #rotate-msg {
      display: none;
      position: fixed; inset: 0;
      background: #0a0a1a;
      color: #FFD700;
      font-family: Arial Black, sans-serif;
      font-size: 18px;
      text-align: center;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 99999;
    }
  </style>
</head>
<body>
  <div id="rotate-msg">
    <div style="font-size:48px">📱</div>
    <div>Please rotate your device<br>to portrait mode</div>
  </div>
  <div id="game"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
